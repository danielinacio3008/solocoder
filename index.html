<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoloCoder</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background-color: #030412; /* Fundo escuro de segurança */
        }
        
        /* Fundo com gradiente radial inspirado no azul escuro da imagem */
        .hero-section {
            min-height: 100vh;
            background: radial-gradient(circle at center, #12143a 0%, #030412 100%);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        /* Espaço para colocar a imagem do logótipo em forma de S */
        .logo-img {
            max-width: 180px;
            margin-bottom: 1.5rem;
        }
        
        /* Estilo do nome da página */
        .brand-name {
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 1.5rem;
        }
        
        /* Estilo do lema */
        .motto {
            font-size: 1.5rem;
            font-weight: 400;
            color: #f8f9fa;
            margin-bottom: 3rem;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.5;
        }

        /* Destaque em azul para o "https:" */
        .highlight-blue {
            color: #009dff; /* Azul ciano semelhante ao da imagem */
            font-weight: 600;
        }
        
        /* Estilo do botão do formulário (com cores baseadas no vosso logo) */
        .btn-custom {
            padding: 15px 45px;
            font-size: 1.25rem;
            font-weight: 600;
            border-radius: 50px;
            background: linear-gradient(90deg, #009dff 0%, #8a2be2 100%);
            color: #ffffff;
            border: none;
            transition: all 0.3s ease;
        }
        
        .btn-custom:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 157, 255, 0.4) !important;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <main class="hero-section">
        <div class="container">
            
            <h1 class="brand-name">SoloCoder</h1>
            
            <p class="motto">
                Aqui nós somos <span class="highlight-blue">https:</span> onde o código<br>é blindado e a criatividade é livre.
            </p>
            
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSeBYpYJ0cYZhHpvjT65mSME_3S6I9Tgal9kx3y15xmU2B_j2Q/viewform?usp=publish-editor" target="_blank" rel="noopener noreferrer" class="btn btn-custom shadow-sm">Aceder ao Formulário</a>
            
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
